# SearXNG settings for cthulu-mcp
# Minimal config: enables JSON output format and DuckDuckGo as the primary engine.

use_default_settings: true

general:
  debug: false
  instance_name: "cthulu-search"

search:
  # REQUIRED: enable json format so cthulu-mcp can call /search?format=json
  formats:
    - html
    - json
  safe_search: 0
  autocomplete: ""
  default_lang: "en"

server:
  secret_key: "cthulu-searxng-secret-change-me"
  bind_address: "0.0.0.0:8080"
  # Disable limiter so local requests from cthulu-mcp are never rate-limited
  limiter: false
  # Allow requests without a proper browser User-Agent (needed for API calls)
  method: "GET"

# Engines — multiple engines enabled for redundancy.
# DuckDuckGo CAPTCHA-blocks containerized IPs so Bing and Brave are the
# reliable fallbacks. All three are enabled so SearXNG merges results.
engines:
  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    disabled: false

  - name: google
    disabled: true

  - name: bing
    engine: bing
    shortcut: b
    disabled: false

  - name: brave
    engine: brave
    shortcut: br
    disabled: false

ui:
  static_use_hash: false
  default_theme: simple
  center_alignment: false
