## SearXNG — self-hosted metasearch engine for cthulu-mcp
##
## Start:   docker compose -f docker-compose.searxng.yml up -d
## Stop:    docker compose -f docker-compose.searxng.yml down
##
## Once running, cthulu-mcp uses http://localhost:8888 for unlimited web search.
## DuckDuckGo is configured as the primary engine inside SearXNG.

services:
  searxng:
    image: searxng/searxng:latest
    container_name: cthulu-searxng
    ports:
      - "8888:8080"
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml:ro
    environment:
      # Generate a strong secret: openssl rand -hex 32
      - SEARXNG_SECRET_KEY=cthulu-searxng-secret-change-me
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/search?q=test&format=json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
