apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: cthulu
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: gcr.io/PROJECT_ID/cthulu:latest
          ports:
            - containerPort: 8081
          env:
            - name: STORAGE
              value: sqlite
            - name: AUTH_ENABLED
              value: "true"
            - name: RUST_LOG
              value: cthulu=info
          resources:
            limits:
              cpu: "2"
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /api/auth/status
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /api/auth/status
              port: 8081
            periodSeconds: 30
