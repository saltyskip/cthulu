apiVersion: apps/v1
kind: Deployment
metadata:
  name: cthulu
  namespace: cthulu-bot
  labels:
    app: cthulu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cthulu
  template:
    metadata:
      labels:
        app: cthulu
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/auth-path: "auth/utilities"
        vault.hashicorp.com/role: "cthulu-svc"
        vault.hashicorp.com/agent-inject-template-env-vars: |
          {{- with secret "cthulu-svc/data/secrets" -}}
          export MONGODB_URI="{{ .Data.data.MONGODB_URI }}"
          export GOOGLE_CLIENT_ID="{{ .Data.data.GOOGLE_CLIENT_ID }}"
          export GOOGLE_CLIENT_SECRET="{{ .Data.data.GOOGLE_CLIENT_SECRET }}"
          export JWT_SECRET="{{ .Data.data.JWT_SECRET }}"
          {{- end }}
    spec:
      serviceAccountName: cthulu-sa
      containers:
        - name: cthulu
          image: 558659058402.dkr.ecr.ap-northeast-1.amazonaws.com/dev-obsidian-sync-server:cthulu-fe1.38
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -a
              source /vault/secrets/env-vars
              set +a
              exec /usr/local/bin/cthulu serve
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: cthulu-config
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cthulu-config
  namespace: cthulu-bot
data:
  STORAGE: "mongo"
  MONGODB_DB: "cthulu"
  AUTH_ENABLED: "true"
  PORT: "8082"
  CTHULU_STATIC_DIR: "/app/static"
  RUST_LOG: "cthulu=info"
  VM_MANAGER_URL: "http://34.100.130.60:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: cthulu
  namespace: cthulu-bot
  labels:
    app: cthulu
spec:
  selector:
    app: cthulu
  ports:
    - port: 80
      targetPort: 8082
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cthulu-sa
  namespace: cthulu-bot