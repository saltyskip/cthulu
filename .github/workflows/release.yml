name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macOS-ARM
          - platform: macos-13
            label: macOS-Intel
          - platform: ubuntu-22.04
            label: Linux-x86_64
          - platform: windows-latest
            label: Windows

    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: cthulu-studio/src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npx nx build cthulu-studio

      - name: Build Tauri app & create release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: cthulu-studio
          tagName: ${{ github.ref_name }}
          releaseName: 'Cthulu Studio ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install Cthulu Studio.'
          releaseDraft: true
          prerelease: false
